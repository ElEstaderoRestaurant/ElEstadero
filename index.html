<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="El Estadero Restaurant — Menú. Cortes ANGUS, parrilladas, mariscos y más. Comayagua, Honduras." />
  <meta name="theme-color" content="#0d0b08" />
  <title>El Estadero — Menú</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ══════════════════════════════════════
       INTRO SPLASH
  ══════════════════════════════════════════ -->
  <div id="intro" aria-hidden="true">
    <video id="intro-video" autoplay muted playsinline preload="auto">
      <source src="el-estadero-intro.mp4" type="video/mp4">
    </video>
    <div class="intro-overlay"></div>
    <div class="intro-logo-wrap">
      <p class="intro-tap-hint" id="tap-hint">Toca para continuar</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       APP SHELL
  ══════════════════════════════════════════ -->
  <div id="app">

    <!-- ── Navbar ── -->
    <nav id="navbar">
      <button class="nav-brand" id="nav-brand-btn" aria-label="Volver al inicio">
        <span class="nav-brand-el">El</span>
        <span class="nav-brand-name">Estadero</span>
        <span class="nav-brand-sub">Restaurant</span>
      </button>

      <div class="nav-actions">
        <button id="info-btn" aria-label="Información del restaurante">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Info
        </button>

        <button id="menu-toggle" aria-label="Categorías" aria-expanded="false">
          <span class="ham-line"></span>
          <span class="ham-line"></span>
          <span class="ham-line"></span>
        </button>
      </div>
    </nav>

    <!-- ── Tab bar ── -->
    <div id="tab-bar" role="tablist" aria-label="Categorías del menú">
      <!-- JS inserts tab buttons -->
    </div>

    <!-- ── Menu panel ── -->
    <main id="menu-panel">
      <!-- JS inserts category panels -->
    </main>

  </div>

  <!-- ══════════════════════════════════════
       DRAWER
  ══════════════════════════════════════════ -->
  <div id="drawer-overlay"></div>
  <aside id="side-drawer" aria-label="Categorías">
    <div class="drawer-head">
      <p class="drawer-label">Menú</p>
      <div class="drawer-rule"></div>
    </div>
    <nav class="drawer-nav" id="drawer-nav"></nav>
    <div class="drawer-foot">
      <p>3244-8155 &nbsp;·&nbsp; Comayagua</p>
    </div>
  </aside>

  <!-- ══════════════════════════════════════
       INFO MODAL
  ══════════════════════════════════════════ -->
  <div id="info-overlay" role="dialog" aria-modal="true">
    <div class="info-modal">
      <div class="info-modal-head">
        <h3>El Estadero</h3>
        <button class="info-close" id="info-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="info-body">
        <div class="info-row">
          <svg class="info-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l.96-.96a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>
          <div class="info-text">
            <span class="info-label">Teléfono</span>
            <a href="tel:32448155" id="info-phone-link">3244-8155</a>
          </div>
        </div>
        <div class="info-row">
          <svg class="info-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div class="info-text">
            <span class="info-label">Ubicación</span>
            <span id="info-address">Plaza Mayor de la Catedral, Comayagua.</span>
          </div>
        </div>
        <div class="info-row">
          <svg class="info-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          <div class="info-text">
            <span class="info-label">Instagram &amp; Facebook</span>
            <a href="#" id="info-ig-link" target="_blank" rel="noopener">@elestaderohn</a>
          </div>
        </div>
        <div class="info-row">
          <svg class="info-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div class="info-text">
            <span class="info-label">Servicio a domicilio</span>
            <span>Disponible — consulta por WhatsApp</span>
          </div>
        </div>
      </div>
      <div class="info-actions">
        <a href="tel:32448155" class="btn-call" id="info-phone-btn">Llamar</a>
        <a href="https://wa.me/50432448155?text=Hola%20El%20Estadero,%20vi%20su%20men%C3%BA%20y%20quisiera%20" class="btn-wa" id="info-wa-link" target="_blank" rel="noopener">WhatsApp</a>
      </div>
    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
